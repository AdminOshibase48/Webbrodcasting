<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dokumentasi | Broadcasting SMK Texar Karawang</title>
  <meta name="description" content="Galeri dokumentasi event kegiatan Broadcasting SMK Texar Karawang">
  
  <!-- Stylesheets -->
  <link rel="stylesheet" href="../assets/css/home.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700;800&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  
  <style>
    /* Additional styles for documentation page */
    .docs-hero {
      height: 50vh;
      min-height: 400px;
      background: linear-gradient(135deg, #050505 0%, #1a1a2e 100%);
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    
    .filter-section {
      padding: 40px 0;
      border-bottom: 1px solid rgba(198,168,91,0.1);
    }
    
    .filter-buttons {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      margin-bottom: 40px;
    }
    
    .filter-btn {
      padding: 8px 24px;
      background: transparent;
      border: 1px solid rgba(198,168,91,0.3);
      color: #A1A1AA;
      font-family: 'Poppins', sans-serif;
      font-size: 0.8rem;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.3s;
      border-radius: 40px;
    }
    
    .filter-btn.active, .filter-btn:hover {
      background: #C6A85B;
      color: #050505;
      border-color: #C6A85B;
    }
    
    .events-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
      gap: 40px;
      padding: 60px 0;
    }
    
    .event-card {
      background: #0B0B0B;
      border: 1px solid rgba(198,168,91,0.2);
      border-radius: 16px;
      overflow: hidden;
      transition: all 0.4s ease;
      cursor: pointer;
    }
    
    .event-card:hover {
      transform: translateY(-8px);
      border-color: #C6A85B;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }
    
    .event-image {
      width: 100%;
      height: 220px;
      object-fit: cover;
      transition: transform 0.5s;
    }
    
    .event-card:hover .event-image {
      transform: scale(1.05);
    }
    
    .event-info {
      padding: 24px;
    }
    
    .event-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem;
      color: #C6A85B;
      margin-bottom: 8px;
    }
    
    .event-date {
      font-size: 0.75rem;
      color: #A1A1AA;
      letter-spacing: 1px;
      margin-bottom: 12px;
    }
    
    .event-description {
      font-size: 0.85rem;
      color: #D1D1D6;
      line-height: 1.6;
    }
    
    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: #A1A1AA;
    }
    
    .empty-state i {
      font-size: 4rem;
      color: #C6A85B;
      margin-bottom: 20px;
      opacity: 0.5;
    }
    
    .loading-spinner {
      text-align: center;
      padding: 60px;
    }
    
    .loading-spinner i {
      font-size: 2rem;
      color: #C6A85B;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    @media (max-width: 768px) {
      .events-grid {
        grid-template-columns: 1fr;
        gap: 30px;
      }
      .docs-hero h1 {
        font-size: 2rem;
      }
    }
  </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar" id="navbar">
  <div class="nav-container">
    <div class="brand">
      <div class="logo-circle">
        <img src="../assets/gambar/favicon.png" alt="Logo">
      </div>
      <div class="brand-text">
        <h2>Broadcasting</h2>
        <p>SMK Texar Karawang</p>
      </div>
    </div>
    <div class="nav-links">
      <a href="../index">Home</a>
      <a href="../index.html#tentang">Tentang</a>
      <a href="../index.html#program">Program</a>
      <a href="../index.html#divisi">Divisi</a>
      <a href="../index.html#anggota">Anggota</a>
      <a href="../pages/dokumentasi.html">Dokumentasi</a>
      <a href="../index.html#kontak">Kontak</a>
    </div>
    <div class="burger" id="burgerBtn">
      <span></span><span></span><span></span>
    </div>
  </div>
</nav>

<!-- Hero Section -->
<section class="docs-hero">
  <div class="hero-content">
    <div class="hero-badge">GALERI KEGIATAN</div>
    <h1>Dokumentasi</h1>
    <div class="hero-sub">Momen terbaik Broadcasting SMK Texar Karawang</div>
  </div>
</section>

<!-- Filter Section -->
<div class="filter-section">
  <div class="container">
    <div class="filter-buttons" id="filterButtons">
      <button class="filter-btn active" data-filter="all">Semua</button>
    </div>
  </div>
</div>

<!-- Events Grid -->
<section class="container">
  <div id="eventsContainer" class="events-grid">
    <div class="loading-spinner">
      <i class="fas fa-spinner"></i>
      <p>Memuat dokumentasi...</p>
    </div>
  </div>
</section>

<!-- Footer -->
<footer class="footer">
  <div class="container">
    <p>© 2026 Broadcasting — SMK Texar Karawang | Creative Media & Broadcasting Club</p>
    <div class="gold-line-animate"></div>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  // ==================== KONFIGURASI SUPABASE ====================
  // GANTI DENGAN PROJECT SUPABASE KAMU!
  const SUPABASE_URL = 'https://yjmutdmhczorrsdaqbkw.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_hkxIwYsO1ku8YcdpdZ9WTg_qeQU5Xip';
  
  // Gunakan nama variabel yang BERBEDA untuk menghindari konflik
  // Jangan pakai 'supabase' karena sudah dipakai oleh library
  const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  
  let allEvents = [];
  let currentFilter = 'all';
  
  // ==================== LOAD EVENTS ====================
  async function loadEvents() {
    const container = document.getElementById('eventsContainer');
    if (!container) return;
    
    container.innerHTML = '<div class="loading-spinner"><i class="fas fa-spinner"></i><p>Memuat dokumentasi...</p></div>';
    
    const { data, error } = await supabaseClient
      .from('events')
      .select('*')
      .order('event_date', { ascending: false });
    
    if (error) {
      console.error('Error loading events:', error);
      container.innerHTML = '<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><p>Gagal memuat data</p></div>';
      return;
    }
    
    allEvents = data || [];
    renderEvents(allEvents);
    setupFilters(allEvents);
  }
  
  function renderEvents(events) {
    const container = document.getElementById('eventsContainer');
    
    if (!events || events.length === 0) {
      container.innerHTML = '<div class="empty-state"><i class="fas fa-camera"></i><p>Belum ada dokumentasi</p><p style="font-size:0.8rem; margin-top:10px;">Dokumentasi akan segera ditambahkan</p></div>';
      return;
    }
    
    container.innerHTML = events.map(event => `
      <div class="event-card" data-id="${event.id}" data-drive="${escapeHtml(event.drive_link)}">
        <img class="event-image" src="${escapeHtml(event.thumbnail || 'https://placehold.co/800x500/191919/C6A85B?text=' + encodeURIComponent(event.title))}" alt="${escapeHtml(event.title)}" loading="lazy">
        <div class="event-info">
          <h3 class="event-title">${escapeHtml(event.title)}</h3>
          <div class="event-date"><i class="far fa-calendar-alt"></i> ${formatDate(event.event_date)}</div>
          <p class="event-description">${escapeHtml(event.description || '')}</p>
        </div>
      </div>
    `).join('');
    
    // Add click handlers untuk buka Google Drive
    document.querySelectorAll('.event-card').forEach(card => {
      card.addEventListener('click', () => {
        const driveLink = card.dataset.drive;
        if (driveLink) window.open(driveLink, '_blank');
      });
    });
  }
  
  function setupFilters(events) {
    const filterContainer = document.getElementById('filterButtons');
    if (!filterContainer) return;
    
    const years = [...new Set(events.map(e => e.event_date ? new Date(e.event_date).getFullYear() : null).filter(y => y))];
    
    const yearButtons = years.map(year => `
      <button class="filter-btn" data-filter="${year}">${year}</button>
    `).join('');
    
    filterContainer.innerHTML = `<button class="filter-btn active" data-filter="all">Semua</button>${yearButtons}`;
    
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const filter = btn.dataset.filter;
        
        if (filter === 'all') {
          renderEvents(allEvents);
        } else {
          const filtered = allEvents.filter(e => {
            if (!e.event_date) return false;
            return new Date(e.event_date).getFullYear().toString() === filter;
          });
          renderEvents(filtered);
        }
      });
    });
  }
  
  function formatDate(dateStr) {
    if (!dateStr) return 'Tanggal belum ditentukan';
    const date = new Date(dateStr);
    return date.toLocaleDateString('id-ID', { year: 'numeric', month: 'long', day: 'numeric' });
  }
  
  function escapeHtml(str) {
    if (!str) return '';
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }
  
  // ==================== NAVBAR SCROLL EFFECT ====================
  function initNavbar() {
    const navbar = document.getElementById('navbar');
    if (!navbar) return;
    
    window.addEventListener('scroll', () => {
      if (window.scrollY > 50) {
        navbar.classList.add('scrolled');
      } else {
        navbar.classList.remove('scrolled');
      }
    });
  }
  
  // ==================== MOBILE MENU ====================
  function initMobileMenu() {
    const burgerBtn = document.getElementById('burgerBtn');
    const mobileMenu = document.getElementById('mobileMenu');
    
    if (!burgerBtn || !mobileMenu) return;
    
    burgerBtn.addEventListener('click', () => {
      burgerBtn.classList.toggle('active');
      mobileMenu.classList.toggle('active');
      
      if (mobileMenu.classList.contains('active')) {
        document.body.style.overflow = 'hidden';
      } else {
        document.body.style.overflow = '';
      }
    });
    
    mobileMenu.querySelectorAll('a').forEach(link => {
      link.addEventListener('click', () => {
        burgerBtn.classList.remove('active');
        mobileMenu.classList.remove('active');
        document.body.style.overflow = '';
      });
    });
  }
  
  // ==================== SMOOTH SCROLL ====================
  function initSmoothScroll() {
    document.querySelectorAll('a[href^="#"]').forEach(anchor => {
      anchor.addEventListener('click', function(e) {
        const targetId = this.getAttribute('href');
        if (targetId === "#" || targetId === "") return;
        const target = document.querySelector(targetId);
        if (target) {
          e.preventDefault();
          const offset = 80;
          const elementPosition = target.getBoundingClientRect().top;
          const offsetPosition = elementPosition + window.pageYOffset - offset;
          
          window.scrollTo({
            top: offsetPosition,
            behavior: 'smooth'
          });
        }
      });
    });
  }
  
  // ==================== INITIALIZE ====================
  document.addEventListener('DOMContentLoaded', () => {
    initNavbar();
    initMobileMenu();
    initSmoothScroll();
    loadEvents();
  });
</script>
<script src="../assets/js/security.js"></script>
</body>
</html>
