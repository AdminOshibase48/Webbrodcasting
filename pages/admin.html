<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | Broadcasting SMK Texar</title>
  <link rel="stylesheet" href="../assets/css/home.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    .admin-login {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #050505 0%, #0f0f1a 100%);
      padding: 20px;
    }
    .login-card {
      background: rgba(11,11,11,0.9);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(198,168,91,0.3);
      border-radius: 24px;
      padding: 48px 40px;
      max-width: 440px;
      width: 100%;
      text-align: center;
    }
    .login-logo {
      width: 70px;
      height: 70px;
      margin: 0 auto 20px;
      border-radius: 50%;
      background: rgba(198,168,91,0.1);
      border: 1px solid #C6A85B;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-logo img {
      width: 45px;
      height: 45px;
    }
    .login-card h2 {
      font-family: 'Playfair Display', serif;
      color: #C6A85B;
      margin-bottom: 8px;
    }
    .login-card p {
      color: #A1A1AA;
      font-size: 0.8rem;
      margin-bottom: 32px;
    }
    .input-group {
      margin-bottom: 24px;
      text-align: left;
    }
    .input-group label {
      display: block;
      font-size: 0.7rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #A1A1AA;
      margin-bottom: 8px;
    }
    .input-group input {
      width: 100%;
      padding: 14px 16px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(198,168,91,0.2);
      border-radius: 12px;
      color: #F8F8F8;
      font-family: 'Inter', sans-serif;
      transition: all 0.3s;
    }
    .input-group input:focus {
      outline: none;
      border-color: #C6A85B;
      background: rgba(198,168,91,0.05);
    }
    .login-btn {
      width: 100%;
      padding: 14px;
      background: #C6A85B;
      border: none;
      border-radius: 40px;
      color: #050505;
      font-weight: 600;
      letter-spacing: 2px;
      cursor: pointer;
      transition: all 0.3s;
    }
    .login-btn:hover {
      background: #E5D3A1;
      transform: translateY(-2px);
    }
    .error-message {
      color: #ff6b6b;
      font-size: 0.8rem;
      margin-top: 16px;
      display: none;
    }
    .back-link {
      display: inline-block;
      margin-top: 24px;
      color: #A1A1AA;
      text-decoration: none;
      font-size: 0.8rem;
    }
    .back-link:hover {
      color: #C6A85B;
    }
  </style>
</head>
<body>
  <div class="admin-login">
    <div class="login-card">
      <div class="login-logo">
        <img src="../assets/gambar/favicon.png" alt="Logo">
      </div>
      <h2>Admin Panel</h2>
      <p>Broadcasting SMK Texar Karawang</p>
      
      <div class="input-group">
        <label>Email</label>
        <input type="email" id="loginEmail" placeholder="admin@broadcasting.com">
      </div>
      <div class="input-group">
        <label>Password</label>
        <input type="password" id="loginPassword" placeholder="••••••••">
      </div>
      
      <button class="login-btn" id="loginBtn">Login →</button>
      <div class="error-message" id="errorMessage"></div>
      <a href=".../index.html" class="back-link">← Kembali ke Website</a>
    </div>
  </div>
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://yjmutdmhczorrsdaqbkw.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_hkxIwYsO1ku8YcdpdZ9WTg_qeQU5Xip';
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    
    document.getElementById('loginBtn').addEventListener('click', async () => {
      const email = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;
      const errorMsg = document.getElementById('errorMessage');
      
      if (!email || !password) {
        errorMsg.style.display = 'block';
        errorMsg.textContent = 'Email dan password wajib diisi';
        return;
      }
      
      try {
        const { data, error } = await supabase.auth.signInWithPassword({
          email: email,
          password: password
        });
        
        if (error) throw error;
        
        if (data.session) {
          localStorage.setItem('admin_token', data.session.access_token);
          window.location.href = 'admin-panel.html';
        }
      } catch (error) {
        errorMsg.style.display = 'block';
        errorMsg.textContent = 'Login gagal. Periksa email dan password Anda.';
      }
    });
    
    document.getElementById('loginPassword').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') document.getElementById('loginBtn').click();
    });
  </script>
</body>
</html>
