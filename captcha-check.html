<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verifikasi Manusia | Broadcasting SMK Texar</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700;800&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #050505;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
        }
        
        .captcha-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #050505 0%, #0a0a15 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
        }
        
        .captcha-card {
            background: rgba(11, 11, 11, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(198, 168, 91, 0.25);
            border-radius: 32px;
            padding: 48px 40px;
            max-width: 480px;
            width: 90%;
            text-align: center;
            animation: fadeInUp 0.6s ease-out;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .captcha-logo {
            width: 70px;
            height: 70px;
            margin: 0 auto 20px;
            border-radius: 50%;
            background: rgba(198,168,91,0.1);
            border: 1px solid #C6A85B;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .captcha-logo img {
            width: 45px;
            height: 45px;
            object-fit: contain;
        }
        
        .captcha-card h2 {
            font-family: 'Playfair Display', serif;
            color: #C6A85B;
            font-size: 1.8rem;
            margin-bottom: 12px;
        }
        
        .captcha-card p {
            color: #A1A1AA;
            font-size: 0.85rem;
            margin-bottom: 32px;
            line-height: 1.6;
        }
        
        /* reCAPTCHA v2 container */
        .g-recaptcha-container {
            display: flex;
            justify-content: center;
            margin: 24px 0;
        }
        
        .verify-btn {
            width: 100%;
            padding: 14px;
            background: #C6A85B;
            border: none;
            border-radius: 40px;
            color: #050505;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            letter-spacing: 2px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 16px;
        }
        
        .verify-btn:hover {
            background: #E5D3A1;
            transform: translateY(-2px);
        }
        
        .verify-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .status {
            margin-top: 16px;
            padding: 12px;
            border-radius: 12px;
            font-size: 0.8rem;
            display: none;
        }
        
        .status.success {
            background: rgba(81, 207, 102, 0.15);
            border: 1px solid #51cf66;
            color: #51cf66;
            display: block;
        }
        
        .status.error {
            background: rgba(255, 107, 107, 0.15);
            border: 1px solid #ff6b6b;
            color: #ff6b6b;
            display: block;
        }
        
        .status.loading {
            background: rgba(198, 168, 91, 0.15);
            border: 1px solid #C6A85B;
            color: #C6A85B;
            display: block;
        }
        
        .retry-link {
            display: inline-block;
            margin-top: 20px;
            color: #A1A1AA;
            font-size: 0.7rem;
            text-decoration: none;
        }
        
        .retry-link:hover {
            color: #C6A85B;
        }
        
        .badge {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 0.6rem;
            color: #666;
        }
    </style>
</head>
<body>

<div class="captcha-container">
    <div class="captcha-card">
        <div class="captcha-logo">
            <img src="assets/gambar/favico.png" alt="Broadcasting Logo" onerror="this.src='https://placehold.co/70x70/2A2A2A/C6A85B?text=B'">
        </div>
        
        <h2>Verifikasi Keamanan</h2>
        <p>Centang kotak di bawah untuk membuktikan bahwa Anda adalah manusia.</p>
        
        <!-- reCAPTCHA v2 Checkbox akan muncul di sini -->
        <div class="g-recaptcha-container">
            <div class="g-recaptcha" data-sitekey="6LcY-McsAAAAAABo-ofxqdXFLrpVVm32XMbFVOuK"></div>
        </div>
        
        <button class="verify-btn" id="verifyBtn" disabled>
            <i class="fas fa-shield-alt"></i> Verifikasi & Lanjutkan
        </button>
        
        <div id="status" class="status"></div>
        <a href="#" class="retry-link" id="retryLink">↻ Muat ulang halaman</a>
    </div>
    <div class="badge">Protected by reCAPTCHA v2</div>
</div>

<!-- Google reCAPTCHA v2 Script -->
<script src="https://www.google.com/recaptcha/api.js" async defer></script>

<script>
    // ==================== KONFIGURASI ====================
    // GANTI DENGAN SITE KEY DARI GOOGLE reCAPTCHA v2!
    // const SITE_KEY = '6LeIxAcTAAAAAJcZVRqyHh71UMIEGNQ_MXjiZKhI';
    
    const verifyBtn = document.getElementById('verifyBtn');
    const retryLink = document.getElementById('retryLink');
    const statusDiv = document.getElementById('status');
    
    let captchaResolved = false;
    
    // ==================== FUNGSI reCAPTCHA ====================
    // Fungsi ini akan dipanggil otomatis oleh reCAPTCHA saat user berhasil verifikasi
    window.onCaptchaSuccess = function(token) {
        captchaResolved = true;
        verifyBtn.disabled = false;
        showStatus('success', '✓ Verifikasi berhasil! Klik tombol untuk melanjutkan.');
    };
    
    // Fungsi ini dipanggil saat reCAPTCHA expired
    window.onCaptchaExpired = function() {
        captchaResolved = false;
        verifyBtn.disabled = true;
        showStatus('error', 'Verifikasi kadaluarsa. Silakan coba lagi.');
    };
    
    // Fungsi ini dipanggil saat reCAPTCHA error
    window.onCaptchaError = function() {
        captchaResolved = false;
        verifyBtn.disabled = true;
        showStatus('error', 'Terjadi kesalahan. Muat ulang halaman.');
    };
    
    function showStatus(type, message) {
        statusDiv.className = `status ${type}`;
        statusDiv.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-triangle'}"></i> ${message}`;
        
        setTimeout(() => {
            if (type !== 'success') {
                statusDiv.style.display = 'none';
                setTimeout(() => { statusDiv.style.display = 'block'; }, 100);
            }
        }, 3000);
    }
    
    function setSessionVerified() {
        sessionStorage.setItem('captcha_verified', 'true');
        sessionStorage.setItem('captcha_time', Date.now().toString());
        document.cookie = "captcha_verified=true; path=/; max-age=3600";
    }
    
    function isSessionVerified() {
        if (sessionStorage.getItem('captcha_verified') === 'true') return true;
        if (document.cookie.includes('captcha_verified=true')) return true;
        return false;
    }
    
    // ==================== VERIFIKASI ====================
    verifyBtn.addEventListener('click', () => {
        if (!captchaResolved) {
            showStatus('error', 'Harap centang kotak verifikasi terlebih dahulu!');
            return;
        }
        
        verifyBtn.disabled = true;
        verifyBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Memproses...';
        showStatus('loading', 'Memverifikasi...');
        
        setTimeout(() => {
            setSessionVerified();
            showStatus('success', '✓ Verifikasi berhasil! Mengalihkan...');
            
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 1000);
        }, 500);
    });
    
    retryLink.addEventListener('click', (e) => {
        e.preventDefault();
        window.location.reload();
    });
    
    // Cek apakah sudah terverifikasi sebelumnya
    if (isSessionVerified()) {
        window.location.href = 'index.html';
    }
    
    // Tambahkan CSS untuk reCAPTCHA agar sesuai tema gelap
    const style = document.createElement('style');
    style.textContent = `
        .g-recaptcha {
            transform: scale(0.95);
            transform-origin: center;
        }
        @media (max-width: 480px) {
            .g-recaptcha {
                transform: scale(0.85);
            }
        }
    `;
    document.head.appendChild(style);
</script>
</body>
</html>
