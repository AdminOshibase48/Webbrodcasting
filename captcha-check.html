<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verifikasi Manusia | Broadcasting SMK Texar</title>

     <!-- Favicon - Versi Paling Kompatibel -->
  <link rel="icon" type="image/x-icon" href="assets/gambar/logo/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/gambar/logo/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/assets/gambar/logo/favicon-16x16.png">
  <link rel="icon" type="image/png" sizes="96x96" href="/assets/gambar/logo/favicon-96x96.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/gambar/logo/apple-touch-icon.png">
  <link rel="manifest" href="/assets/gambar/logo/site.webmanifest">
  <meta name="msapplication-TileColor" content="#050505">
  <meta name="theme-color" content="#C6A85B">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700;800&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #050505;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            position: relative;
            overflow: hidden;
        }
        
        /* Cinematic background effect */
        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at 50% 30%, rgba(198,168,91,0.08) 0%, transparent 70%);
            pointer-events: none;
        }
        
        .captcha-container {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 500px;
            margin: 20px;
            animation: fadeInUp 0.6s ease-out;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .captcha-card {
            background: rgba(11, 11, 11, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(198, 168, 91, 0.3);
            border-radius: 32px;
            padding: 48px 40px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }
        
        .captcha-logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 24px;
            border-radius: 50%;
            background: rgba(198,168,91,0.1);
            border: 1.5px solid #C6A85B;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        
        .captcha-logo img {
            width: 50px;
            height: 50px;
            object-fit: contain;
        }
        
        .captcha-card h2 {
            font-family: 'Playfair Display', serif;
            color: #C6A85B;
            font-size: 1.8rem;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }
        
        .captcha-card p {
            color: #A1A1AA;
            font-size: 0.85rem;
            margin-bottom: 32px;
            line-height: 1.6;
        }
        
        /* reCAPTCHA container */
        .g-recaptcha-container {
            display: flex;
            justify-content: center;
            margin: 24px 0;
            transform: scale(0.95);
        }
        
        .verify-btn {
            width: 100%;
            padding: 14px;
            background: #C6A85B;
            border: none;
            border-radius: 40px;
            color: #050505;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            letter-spacing: 2px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 16px;
        }
        
        .verify-btn:hover {
            background: #E5D3A1;
            transform: translateY(-2px);
        }
        
        .verify-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .status-message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 12px;
            font-size: 0.8rem;
            display: none;
        }
        
        .status-message.success {
            background: rgba(81, 207, 102, 0.1);
            border: 1px solid #51cf66;
            color: #51cf66;
            display: block;
        }
        
        .status-message.error {
            background: rgba(255, 107, 107, 0.1);
            border: 1px solid #ff6b6b;
            color: #ff6b6b;
            display: block;
        }
        
        .status-message.loading {
            background: rgba(198, 168, 91, 0.1);
            border: 1px solid #C6A85B;
            color: #C6A85B;
            display: block;
        }
        
        .retry-link {
            display: inline-block;
            margin-top: 20px;
            color: #A1A1AA;
            font-size: 0.7rem;
            text-decoration: none;
            transition: color 0.2s;
            cursor: pointer;
        }
        
        .retry-link:hover {
            color: #C6A85B;
        }
        
        .footer-badge {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 0.6rem;
            color: #4a4a5a;
            z-index: 2;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }
    </style>
    
    <!-- Google reCAPTCHA v2 -->
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
</head>
<body>

<div class="captcha-container">
    <div class="captcha-card">
        <div class="captcha-logo">
            <img src="assets/gambar/favicon.png" alt="Broadcasting Logo" 
                 onerror="this.src='https://placehold.co/80x80/2A2A2A/C6A85B?text=B'">
        </div>
        
        <h2>Verifikasi Keamanan</h2>
        <p>Untuk mengakses website Broadcasting SMK Texar, silakan verifikasi bahwa Anda adalah manusia.</p>
        
        <!-- reCAPTCHA v2 akan muncul di sini -->
        <div class="g-recaptcha-container">
            <div class="g-recaptcha" 
                 data-sitekey="6LcY-McsAAAAAABo-ofxqdXFLrpVVm32XMbFVOuK"
                 data-callback="onCaptchaSuccess"
                 data-expired-callback="onCaptchaExpired"
                 data-theme="dark">
            </div>
        </div>
        
        <button class="verify-btn" id="verifyBtn" disabled>
            <i class="fas fa-shield-alt"></i> Verifikasi & Masuk
        </button>
        
        <div id="statusMessage" class="status-message"></div>
        
        <a class="retry-link" id="retryLink">
            <i class="fas fa-sync-alt"></i> Verifikasi ulang
        </a>
    </div>
</div>

<div class="footer-badge">
    Protected by reCAPTCHA | Broadcasting SMK Texar Karawang
</div>

<script>
    // ==================== KONFIGURASI ====================
    // GANTI DENGAN SITE KEY DARI GOOGLE reCAPTCHA v2!
    // Cara dapatkan: https://www.google.com/recaptcha/admin
    const RECAPTCHA_SITE_KEY = '6LcY-McsAAAAAABo-ofxqdXFLrpVVm32XMbFVOuK';
    
    // State
    let captchaToken = null;
    let isVerified = false;
    
    // ==================== ELEMENTS ====================
    const verifyBtn = document.getElementById('verifyBtn');
    const retryLink = document.getElementById('retryLink');
    const statusDiv = document.getElementById('statusMessage');
    
    // ==================== FUNCTIONS ====================
    function showStatus(type, message) {
        statusDiv.className = `status-message ${type}`;
        statusDiv.innerHTML = message;
        
        // Auto hide after 3 seconds for success/error
        if (type === 'success' || type === 'error') {
            setTimeout(() => {
                if (statusDiv.className.includes(type)) {
                    statusDiv.style.display = 'none';
                    setTimeout(() => {
                        statusDiv.style.display = '';
                    }, 300);
                }
            }, 3000);
        }
    }
    
    function setSessionVerified() {
        // Session storage (hilang saat browser ditutup)
        sessionStorage.setItem('captcha_verified', 'true');
        sessionStorage.setItem('captcha_time', Date.now().toString());
        
        // Cookie short-term (1 jam, opsional sebagai backup)
        document.cookie = "captcha_verified=true; path=/; max-age=3600";
    }
    
    function isSessionVerified() {
        if (sessionStorage.getItem('captcha_verified') === 'true') return true;
        if (document.cookie.includes('captcha_verified=true')) return true;
        return false;
    }
    
    function redirectToWebsite() {
        showStatus('success', '✓ Verifikasi berhasil! Mengalihkan ke website...');
        verifyBtn.disabled = true;
        
        setTimeout(() => {
            window.location.href = 'index.html';
        }, 1000);
    }
    
    // ==================== reCAPTCHA CALLBACKS ====================
    window.onCaptchaSuccess = function(token) {
        console.log('CAPTCHA berhasil');
        captchaToken = token;
        isVerified = true;
        verifyBtn.disabled = false;
        showStatus('success', '✓ Verifikasi berhasil! Klik tombol untuk masuk.');
    };
    
    window.onCaptchaExpired = function() {
        console.log('CAPTCHA expired');
        captchaToken = null;
        isVerified = false;
        verifyBtn.disabled = true;
        showStatus('error', '⏰ Verifikasi kadaluarsa. Silakan centang ulang.');
    };
    
    // ==================== VERIFY BUTTON ====================
    verifyBtn.addEventListener('click', async () => {
        if (!isVerified || !captchaToken) {
            showStatus('error', '❌ Silakan centang "Saya bukan robot" terlebih dahulu!');
            return;
        }
        
        verifyBtn.disabled = true;
        verifyBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Memproses...';
        
        try {
            // Di sini kamu bisa kirim token ke backend untuk validasi
            // Untuk sekarang, kita langsung anggap valid
            
            setSessionVerified();
            redirectToWebsite();
            
        } catch (error) {
            console.error('Error:', error);
            showStatus('error', 'Terjadi kesalahan. Silakan coba lagi.');
            verifyBtn.disabled = false;
            verifyBtn.innerHTML = '<i class="fas fa-shield-alt"></i> Verifikasi & Masuk';
        }
    });
    
    // ==================== RETRY LINK ====================
    retryLink.addEventListener('click', () => {
        // Reset CAPTCHA
        if (typeof grecaptcha !== 'undefined') {
            grecaptcha.reset();
        }
        captchaToken = null;
        isVerified = false;
        verifyBtn.disabled = true;
        showStatus('loading', '🔄 Silakan centang "Saya bukan robot" lagi.');
        
        setTimeout(() => {
            if (statusDiv.className.includes('loading')) {
                statusDiv.style.display = 'none';
                setTimeout(() => {
                    statusDiv.style.display = '';
                }, 300);
            }
        }, 2000);
    });
    
    // ==================== CEK SESSION SEBELUMNYA ====================
    if (isSessionVerified()) {
        // Langsung redirect ke index (tanpa CAPTCHA)
        window.location.href = 'index.html';
    }
    
    // ==================== TEMA DARK UNTUK reCAPTCHA ====================
    // Styling tambahan untuk reCAPTCHA agar sesuai tema
    const style = document.createElement('style');
    style.textContent = `
        .g-recaptcha {
            transform: scale(0.92);
            transform-origin: center;
        }
        .g-recaptcha iframe {
            border-radius: 8px;
        }
    `;
    document.head.appendChild(style);
</script>
</body>
</html>
