<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verifikasi | Broadcasting SMK Texar</title>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700;800&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #050505;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            position: relative;
            overflow: hidden;
        }
        
        /* Background cinematic effect */
        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at 50% 30%, rgba(198,168,91,0.08) 0%, transparent 70%);
            pointer-events: none;
        }
        
        .captcha-container {
            position: relative;
            z-index: 2;
            width: 100%;
            padding: 20px;
        }
        
        .captcha-card {
            max-width: 480px;
            margin: 0 auto;
            background: rgba(11, 11, 11, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(198, 168, 91, 0.3);
            border-radius: 32px;
            padding: 48px 40px;
            text-align: center;
            animation: fadeInUp 0.6s ease-out;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* Logo dari PNG user */
        .captcha-logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            border-radius: 50%;
            background: rgba(198,168,91,0.08);
            border: 1px solid rgba(198,168,91,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        
        .captcha-logo img {
            width: 55px;
            height: 55px;
            object-fit: contain;
        }
        
        .captcha-card h2 {
            font-family: 'Playfair Display', serif;
            color: #C6A85B;
            font-size: 1.8rem;
            margin-bottom: 12px;
        }
        
        .captcha-card p {
            color: #A1A1AA;
            font-size: 0.85rem;
            margin-bottom: 32px;
            line-height: 1.6;
        }
        
        /* reCAPTCHA container */
        .g-recaptcha-container {
            display: flex;
            justify-content: center;
            margin: 24px 0;
            transform: scale(0.95);
        }
        
        .verify-btn {
            width: 100%;
            padding: 14px;
            background: #C6A85B;
            border: none;
            border-radius: 40px;
            color: #050505;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            letter-spacing: 2px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 16px;
        }
        
        .verify-btn:hover {
            background: #E5D3A1;
            transform: translateY(-2px);
        }
        
        .verify-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .status-message {
            margin-top: 20px;
            padding: 10px;
            border-radius: 12px;
            font-size: 0.8rem;
            display: none;
        }
        
        .status-message.success {
            display: block;
            background: rgba(81, 207, 102, 0.15);
            border: 1px solid #51cf66;
            color: #51cf66;
        }
        
        .status-message.error {
            display: block;
            background: rgba(255, 107, 107, 0.15);
            border: 1px solid #ff6b6b;
            color: #ff6b6b;
        }
        
        .status-message.loading {
            display: block;
            background: rgba(198, 168, 91, 0.1);
            border: 1px solid #C6A85B;
            color: #C6A85B;
        }
        
        .footer-note {
            margin-top: 24px;
            font-size: 0.6rem;
            color: #666;
        }
        
        /* Animasi shimmer untuk teks */
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        
        .gold-text {
            background: linear-gradient(120deg, #C6A85B 20%, #E5D3A1 40%, #C6A85B 60%);
            background-size: 200% auto;
            color: transparent;
            background-clip: text;
            -webkit-background-clip: text;
            animation: shimmer 3s ease-in-out infinite;
        }
    </style>
    
    <!-- Google reCAPTCHA v2 -->
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
</head>
<body>

<div class="captcha-container">
    <div class="captcha-card">
        <div class="captcha-logo">
            <img src="assets/gambar/Favicon.png" alt="Broadcasting Logo" 
                 onerror="this.src='https://placehold.co/80x80/C6A85B/050505?text=B'">
        </div>
        
        <h2>Verifikasi <span class="gold-text">Keamanan</span></h2>
        <p>Untuk mengakses website Broadcasting SMK Texar,<br>silakan konfirmasi bahwa Anda bukan robot.</p>
        
        <!-- reCAPTCHA v2 widget -->
        <div class="g-recaptcha-container">
            <div class="g-recaptcha" data-sitekey="YOUR_SITE_KEY_HERE" data-theme="dark"></div>
        </div>
        
        <button class="verify-btn" id="verifyBtn" disabled>
            <i class="fas fa-shield-alt"></i> Verifikasi & Masuk
        </button>
        
        <div id="statusMessage" class="status-message"></div>
        <div class="footer-note">Protected by reCAPTCHA</div>
    </div>
</div>

<script>
    // ==================== KONFIGURASI ====================
    // GANTI DENGAN SITE KEY DARI GOOGLE reCAPTCHA v2!
    // (SITE KEY didapat dari https://www.google.com/recaptcha/admin)
    const SITE_KEY = '6LcY-McsAAAAAABo-ofxqdXFLrpVVm32XMbFVOuK';
    
    // ==================== ELEMENTS ====================
    const verifyBtn = document.getElementById('verifyBtn');
    const statusMsg = document.getElementById('statusMessage');
    
    // ==================== FUNGSI ====================
    function showStatus(type, message) {
        statusMsg.className = `status-message ${type}`;
        statusMsg.innerHTML = message;
        
        // Auto hide after 3 seconds for success
        if (type === 'success') {
            setTimeout(() => {
                statusMsg.style.display = 'none';
            }, 3000);
        }
    }
    
    function hideStatus() {
        statusMsg.style.display = 'none';
        statusMsg.className = 'status-message';
    }
    
    // Set verifikasi PERMANEN di browser ini
    function setPermanentVerification() {
        // Local storage (permanen sampai user hapus cache)
        localStorage.setItem('broadcasting_verified', 'true');
        localStorage.setItem('broadcasting_verified_date', new Date().toISOString());
        
        // Session storage backup
        sessionStorage.setItem('captcha_verified', 'true');
        
        // Cookie (expired 1 tahun)
        document.cookie = "captcha_verified=true; path=/; max-age=31536000";
    }
    
    function isPermanentlyVerified() {
        // Cek local storage
        if (localStorage.getItem('broadcasting_verified') === 'true') {
            return true;
        }
        // Cek session storage
        if (sessionStorage.getItem('captcha_verified') === 'true') {
            return true;
        }
        // Cek cookie
        if (document.cookie.includes('captcha_verified=true')) {
            return true;
        }
        return false;
    }
    
    // Cek apakah reCAPTCHA sudah selesai
    function onCaptchaCompleted() {
        verifyBtn.disabled = false;
        hideStatus();
    }
    
    function onCaptchaExpired() {
        verifyBtn.disabled = true;
        showStatus('error', '⏱️ Verifikasi kadaluarsa. Silakan centang ulang.');
    }
    
    function onCaptchaError() {
        verifyBtn.disabled = true;
        showStatus('error', '❌ Terjadi kesalahan. Silakan refresh halaman.');
    }
    
    // Verifikasi ke Google
    async function verifyWithGoogle(responseToken) {
        if (!responseToken) {
            showStatus('error', '❌ Silakan centang kotak "Saya bukan robot" terlebih dahulu.');
            return false;
        }
        
        showStatus('loading', '🔄 Memverifikasi...');
        verifyBtn.disabled = true;
        verifyBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Memverifikasi...';
        
        try {
            // Di sini idealnya kirim token ke backend untuk validasi
            // Untuk frontend-only, kita terima tokennya dan anggap valid
            
            // Simulasi validasi (untuk production, sebaiknya kirim ke server)
            if (responseToken && responseToken.length > 20) {
                // Verifikasi berhasil
                showStatus('success', '✅ Verifikasi berhasil! Mengalihkan...');
                setPermanentVerification();
                
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1500);
                return true;
            } else {
                throw new Error('Token tidak valid');
            }
            
        } catch (error) {
            console.error('Verification error:', error);
            showStatus('error', '❌ Verifikasi gagal. Silakan coba lagi.');
            verifyBtn.disabled = false;
            verifyBtn.innerHTML = '<i class="fas fa-shield-alt"></i> Verifikasi & Masuk';
            
            // Reset reCAPTCHA
            if (typeof grecaptcha !== 'undefined') {
                grecaptcha.reset();
            }
            return false;
        }
    }
    
    // ==================== EVENT LISTENERS ====================
    verifyBtn.addEventListener('click', async () => {
        if (typeof grecaptcha !== 'undefined') {
            const token = grecaptcha.getResponse();
            await verifyWithGoogle(token);
        } else {
            showStatus('error', '❌ reCAPTCHA belum siap. Refresh halaman.');
        }
    });
    
    // ==================== CEK SUDAH TERVERIFIKASI ====================
    if (isPermanentlyVerified()) {
        // Langsung redirect ke index
        window.location.href = 'index.html';
    }
    
    // Expose callback functions ke global (dipanggil oleh reCAPTCHA)
    window.onCaptchaCompleted = onCaptchaCompleted;
    window.onCaptchaExpired = onCaptchaExpired;
    window.onCaptchaError = onCaptchaError;
</script>

<!-- Register callback untuk reCAPTCHA -->
<script>
    // Tunggu reCAPTCHA siap
    window.onload = function() {
        if (typeof grecaptcha !== 'undefined') {
            // Optional: render ulang jika perlu
            console.log('reCAPTCHA v2 siap');
        }
    };
</script>

</body>
</html>
