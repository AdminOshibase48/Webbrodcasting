<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verifikasi | Broadcasting SMK Texar</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700;800&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #050505;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
        }
        
        .captcha-container {
            width: 100%;
            padding: 20px;
        }
        
        .captcha-card {
            max-width: 480px;
            margin: 0 auto;
            background: #0B0B0B;
            border: 1px solid rgba(198,168,91,0.25);
            border-radius: 32px;
            padding: 48px 40px;
            text-align: center;
            animation: fadeIn 0.6s ease-out;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .logo {
            width: 70px;
            height: 70px;
            margin: 0 auto 20px;
            border-radius: 50%;
            background: rgba(198,168,91,0.1);
            border: 1px solid #C6A85B;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .logo i {
            font-size: 32px;
            color: #C6A85B;
        }
        
        .captcha-card h2 {
            font-family: 'Playfair Display', serif;
            color: #C6A85B;
            font-size: 1.8rem;
            margin-bottom: 12px;
        }
        
        .captcha-card p {
            color: #A1A1AA;
            font-size: 0.85rem;
            margin-bottom: 32px;
            line-height: 1.6;
        }
        
        .g-recaptcha {
            display: flex;
            justify-content: center;
            margin: 24px 0;
        }
        
        .verify-btn {
            width: 100%;
            padding: 14px;
            background: #C6A85B;
            border: none;
            border-radius: 40px;
            color: #050505;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            letter-spacing: 2px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 16px;
        }
        
        .verify-btn:hover {
            background: #E5D3A1;
            transform: translateY(-2px);
        }
        
        .verify-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .status {
            margin-top: 20px;
            padding: 12px;
            border-radius: 12px;
            font-size: 0.8rem;
            display: none;
        }
        
        .status.success {
            background: rgba(81, 207, 102, 0.1);
            border: 1px solid #51cf66;
            color: #51cf66;
            display: block;
        }
        
        .status.error {
            background: rgba(255, 107, 107, 0.1);
            border: 1px solid #ff6b6b;
            color: #ff6b6b;
            display: block;
        }
        
        .status.loading {
            background: rgba(198,168,91,0.1);
            border: 1px solid #C6A85B;
            color: #C6A85B;
            display: block;
        }
        
        .footer-note {
            margin-top: 24px;
            font-size: 0.6rem;
            color: #666;
        }
        
        .hidden {
            display: none;
        }
    </style>
    
    <!-- reCAPTCHA v2 Script -->
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
</head>
<body>

<div class="captcha-container">
    <div class="captcha-card">
        <div class="logo">
            <i class="fas fa-broadcast-tower"></i>
        </div>
        
        <h2>Verifikasi Keamanan</h2>
        <p>Untuk mengakses website Broadcasting, silakan verifikasi bahwa Anda adalah manusia.</p>
        
        <!-- reCAPTCHA v2 widget -->
        <div class="g-recaptcha" data-sitekey="YOUR_SITE_KEY_HERE"></div>
        
        <button class="verify-btn" id="verifyBtn" disabled>
            <i class="fas fa-check-circle"></i> Verifikasi & Masuk
        </button>
        
        <div id="status" class="status"></div>
        <div class="footer-note">
            <i class="fas fa-shield-alt"></i> Website dilindungi reCAPTCHA
        </div>
    </div>
</div>

<script>
    // ==================== KONFIGURASI ====================
    // Ganti dengan SITE KEY dari Google reCAPTCHA v2!
    // Contoh: '6LeIxAcTAAAAAJcZVRqyHh71UMIEGNQ_MXjiZKhI'
    const SITE_KEY = '6LcY-McsAAAAAABo-ofxqdXFLrpVVm32XMbFVOuK';
    
    // Durasi verifikasi (1 jam = 3600000 ms)
    // Set null untuk "selamanya" sampai browser ditutup
    const VERIFY_DURATION = 3600000; // 1 jam (ubah sesuai kebutuhan)
    
    // ==================== ELEMENTS ====================
    const verifyBtn = document.getElementById('verifyBtn');
    const statusDiv = document.getElementById('status');
    
    // ==================== FUNCTIONS ====================
    function showStatus(type, message) {
        statusDiv.className = `status ${type}`;
        statusDiv.innerHTML = message;
        
        // Auto hide after 3 seconds for success/error
        if (type === 'success' || type === 'error') {
            setTimeout(() => {
                if (statusDiv.className === `status ${type}`) {
                    statusDiv.style.display = 'none';
                    setTimeout(() => {
                        statusDiv.style.display = '';
                    }, 100);
                }
            }, 3000);
        }
    }
    
    // Set session bahwa sudah terverifikasi
    function setVerified() {
        // Session storage (hilang saat browser ditutup)
        sessionStorage.setItem('captcha_verified', 'true');
        sessionStorage.setItem('captcha_time', Date.now().toString());
        
        // Cookie sebagai backup (expired sesuai VERIFY_DURATION)
        if (VERIFY_DURATION) {
            const expiryDate = new Date(Date.now() + VERIFY_DURATION);
            document.cookie = `captcha_verified=true; path=/; expires=${expiryDate.toUTCString()}`;
        } else {
            // Session cookie (hilang saat browser ditutup)
            document.cookie = `captcha_verified=true; path=/`;
        }
    }
    
    // Cek apakah sudah terverifikasi sebelumnya
    function isAlreadyVerified() {
        // Cek session storage
        if (sessionStorage.getItem('captcha_verified') === 'true') {
            const time = parseInt(sessionStorage.getItem('captcha_time'));
            if (VERIFY_DURATION && time) {
                if (Date.now() - time < VERIFY_DURATION) {
                    return true;
                } else {
                    // Sudah expired, hapus
                    sessionStorage.removeItem('captcha_verified');
                    sessionStorage.removeItem('captcha_time');
                }
            } else if (!VERIFY_DURATION) {
                return true;
            }
        }
        
        // Cek cookie
        if (document.cookie.includes('captcha_verified=true')) {
            return true;
        }
        
        return false;
    }
    
    // Verifikasi token ke Google (opsional, untuk backend)
    async function verifyWithGoogle(token) {
        // Untuk frontend saja, kita terima saja karena reCAPTCHA sudah memberikan token
        // Tapi idealnya kirim token ke backend untuk divalidasi
        return true;
    }
    
    // Main verify function
    async function handleVerification() {
        const token = grecaptcha.getResponse();
        
        if (!token) {
            showStatus('error', '❌ Silakan centang "Saya bukan robot" terlebih dahulu!');
            return;
        }
        
        showStatus('loading', '<i class="fas fa-spinner fa-pulse"></i> Memverifikasi...');
        verifyBtn.disabled = true;
        
        try {
            // Validasi token (opsional, bisa ditambah backend)
            const isValid = await verifyWithGoogle(token);
            
            if (isValid) {
                showStatus('success', '✓ Verifikasi berhasil! Mengalihkan ke halaman utama...');
                setVerified();
                
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1500);
            } else {
                throw new Error('Verifikasi gagal');
            }
            
        } catch (error) {
            console.error('Error:', error);
            showStatus('error', '❌ Verifikasi gagal. Silakan coba lagi.');
            grecaptcha.reset();
            verifyBtn.disabled = false;
        }
    }
    
    // ==================== EVENT LISTENERS ====================
    verifyBtn.addEventListener('click', handleVerification);
    
    // Enable verify button when recaptcha is solved
    window.onloadCallback = function() {
        // Button akan aktif saat user sudah centang
        const checkCaptcha = setInterval(() => {
            if (grecaptcha && grecaptcha.getResponse().length > 0) {
                verifyBtn.disabled = false;
                clearInterval(checkCaptcha);
            }
        }, 500);
    };
    
    // ==================== CHECK IF ALREADY VERIFIED ====================
    if (isAlreadyVerified()) {
        // Langsung redirect ke index
        window.location.href = 'index.html';
    }
</script>

<!-- Re-initialize recaptcha -->
<script>
    // Ensure grecaptcha renders
    if (typeof grecaptcha !== 'undefined') {
        grecaptcha.ready(() => {
            console.log('reCAPTCHA v2 siap');
        });
    }
</script>
</body>
</html>
